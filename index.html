<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>呼吸冥想引导 - 正念呼吸训练</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1724;
    --bg2: #1a2332;
    --text: #c8d6e5;
    --text-light: #8a9bb5;
    --accent: #5b9bd5;
    --accent2: #7c5cbf;
    --soft-green: #6bca9b;
    --soft-blue: #6baed6;
    --soft-purple: #9b7ec4;
    --soft-teal: #5cc9b0;
    --danger: #e07070;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, #0f1724 0%, #131e30 25%, #162435 50%, #101a2e 75%, #0f1724 100%);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 16px;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
  }

  @keyframes bgShift {
    0%, 100% { background-position: 0% 50%; }
    25% { background-position: 100% 0%; }
    50% { background-position: 100% 100%; }
    75% { background-position: 0% 100%; }
  }

  .container {
    max-width: 520px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    padding: 12px 0 40px;
  }

  /* Header */
  .header { text-align: center; }
  .header h1 {
    font-size: 2rem;
    font-weight: 300;
    letter-spacing: 0.05em;
    background: linear-gradient(135deg, var(--soft-teal), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .subtitle {
    font-size: 0.9rem;
    color: var(--text-light);
    margin-top: 4px;
    letter-spacing: 0.06em;
  }

  /* Circle Area */
  .circle-area {
    position: relative;
    width: 260px;
    height: 260px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .circle-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(91,155,213,0.06) 0%, rgba(124,92,191,0.04) 50%, transparent 70%);
    pointer-events: none;
  }
  .circle-ring {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid rgba(91,155,213,0.15);
    pointer-events: none;
  }
  .breathing-circle {
    position: absolute;
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 35%, rgba(107,202,155,0.7) 0%, rgba(91,155,213,0.5) 40%, rgba(124,92,191,0.3) 100%);
    box-shadow: 0 0 40px rgba(107,202,155,0.25), 0 0 80px rgba(91,155,213,0.15), 0 0 120px rgba(124,92,191,0.1);
    transition: width 0.05s linear, height 0.05s linear;
    z-index: 2;
  }
  .breathing-circle.inhale {
    animation: none;
  }
  .breathing-circle.hold {
    filter: brightness(1.15);
  }
  .breathing-circle.exhale {
    filter: brightness(0.9);
  }

  .phase-text {
    position: relative;
    z-index: 3;
    text-align: center;
    pointer-events: none;
  }
  .phase-label {
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.08em;
    color: var(--soft-teal);
    text-shadow: 0 0 20px rgba(92,201,176,0.3);
  }
  .phase-seconds {
    font-size: 2.8rem;
    font-weight: 200;
    color: var(--text);
    line-height: 1;
    margin-top: 2px;
  }
  .phase-desc {
    font-size: 0.8rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* Technique Selector */
  .technique-selector {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
  }
  .tech-btn {
    background: rgba(26,35,50,0.8);
    border: 1px solid rgba(91,155,213,0.15);
    color: var(--text-light);
    padding: 12px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 0.85rem;
    font-family: inherit;
    transition: all 0.3s ease;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .tech-btn:hover {
    border-color: rgba(91,155,213,0.35);
    background: rgba(26,35,50,1);
    color: var(--text);
  }
  .tech-btn.active {
    border-color: var(--soft-teal);
    background: rgba(92,201,176,0.1);
    color: var(--soft-teal);
    box-shadow: 0 0 20px rgba(92,201,176,0.1);
  }
  .tech-btn .tech-name {
    display: block;
    font-weight: 500;
    margin-bottom: 2px;
  }
  .tech-btn .tech-pattern {
    display: block;
    font-size: 0.72rem;
    opacity: 0.7;
  }

  /* Controls Row */
  .controls-row {
    display: flex;
    gap: 10px;
    align-items: center;
    width: 100%;
    justify-content: center;
    flex-wrap: wrap;
  }

  .timer-setting {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(26,35,50,0.8);
    border: 1px solid rgba(91,155,213,0.15);
    border-radius: 10px;
    padding: 8px 12px;
    backdrop-filter: blur(10px);
  }
  .timer-setting span {
    font-size: 0.8rem;
    color: var(--text-light);
    white-space: nowrap;
  }
  .timer-setting input {
    width: 50px;
    background: transparent;
    border: none;
    color: var(--soft-teal);
    font-size: 0.9rem;
    font-family: inherit;
    text-align: center;
    outline: none;
  }
  .timer-setting input::-webkit-inner-spin-button {
    opacity: 1;
    height: 24px;
  }

  .btn {
    background: rgba(26,35,50,0.8);
    border: 1px solid rgba(91,155,213,0.2);
    color: var(--text);
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    transition: all 0.3s ease;
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }
  .btn:hover {
    background: rgba(26,35,50,1);
    border-color: rgba(91,155,213,0.4);
  }
  .btn.primary {
    background: rgba(92,201,176,0.15);
    border-color: rgba(92,201,176,0.3);
    color: var(--soft-teal);
    font-weight: 500;
    letter-spacing: 0.04em;
  }
  .btn.primary:hover {
    background: rgba(92,201,176,0.25);
    border-color: rgba(92,201,176,0.5);
  }
  .btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }
  .btn.small {
    padding: 6px 14px;
    font-size: 0.8rem;
    border-radius: 20px;
  }

  .sound-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(26,35,50,0.8);
    border: 1px solid rgba(91,155,213,0.15);
    border-radius: 10px;
    padding: 8px 14px;
    cursor: pointer;
    font-size: 0.85rem;
    color: var(--text-light);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    font-family: inherit;
  }
  .sound-toggle:hover {
    border-color: rgba(91,155,213,0.35);
  }
  .sound-toggle.on {
    border-color: rgba(92,201,176,0.3);
    color: var(--soft-teal);
  }

  /* Progress Bar */
  .progress-bar-wrap {
    width: 100%;
    height: 4px;
    background: rgba(91,155,213,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--soft-teal), var(--accent2));
    border-radius: 2px;
    transition: width 0.3s ease;
    width: 0%;
  }

  /* Stats */
  .stats-card {
    width: 100%;
    background: rgba(26,35,50,0.5);
    border: 1px solid rgba(91,155,213,0.1);
    border-radius: 16px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    text-align: center;
    backdrop-filter: blur(10px);
  }
  .stat-item .stat-value {
    font-size: 1.5rem;
    font-weight: 200;
    color: var(--soft-teal);
  }
  .stat-item .stat-label {
    font-size: 0.7rem;
    color: var(--text-light);
    margin-top: 2px;
  }

  /* Daily reminder */
  .daily-reminder {
    width: 100%;
    background: rgba(92,201,176,0.06);
    border: 1px solid rgba(92,201,176,0.12);
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 0.82rem;
    color: var(--soft-teal);
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* Benefits */
  .benefits-section {
    width: 100%;
    background: rgba(26,35,50,0.5);
    border: 1px solid rgba(91,155,213,0.1);
    border-radius: 16px;
    padding: 18px 20px;
    backdrop-filter: blur(10px);
  }
  .benefits-section h3 {
    font-size: 1rem;
    font-weight: 400;
    color: var(--text-light);
    margin-bottom: 12px;
    letter-spacing: 0.04em;
  }
  .benefit-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(91,155,213,0.06);
    font-size: 0.82rem;
    color: var(--text-light);
    line-height: 1.5;
  }
  .benefit-item:last-child {
    border-bottom: none;
  }
  .benefit-icon {
    color: var(--soft-teal);
    font-size: 1rem;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .footer {
    text-align: center;
    font-size: 0.7rem;
    color: rgba(138,155,181,0.4);
    margin-top: 8px;
  }

  /* Completed toast */
  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(92,201,176,0.15);
    border: 1px solid rgba(92,201,176,0.3);
    color: var(--soft-teal);
    padding: 12px 24px;
    border-radius: 25px;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.5s ease;
    z-index: 100;
    text-align: center;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>呼吸冥想引导</h1>
    <p class="subtitle">呼吸冥想指南</p>
  </div>

  <!-- Breathing Circle -->
  <div class="circle-area" id="circleArea">
    <div class="circle-bg"></div>
    <div class="circle-ring"></div>
    <div class="breathing-circle" id="breathingCircle"></div>
    <div class="phase-text" id="phaseText">
      <div class="phase-label" id="phaseLabel">准备</div>
      <div class="phase-seconds" id="phaseSeconds">--</div>

    </div>
  </div>

  <!-- Progress -->
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar"></div></div>

  <!-- Controls -->
  <div class="timer-setting" id="timerSetting">
    <span>总时长</span>
    <input type="number" id="durationMin" value="5" min="1" max="30"> <span>分钟</span>
  </div>

  <div class="controls-row">
    <button class="btn primary" id="btnStart">开始练习</button>
    <button class="btn" id="btnPause" disabled>暂停</button>
    <button class="btn" id="btnReset">重置</button>
  </div>
  <div class="controls-row">
    <button class="sound-toggle on" id="btnSound" onclick="toggleSound()">🔔 提示音：开</button>
  </div>

  <!-- Technique Selection -->
  <div class="technique-selector" id="techniqueSelector">
    <button class="tech-btn active" data-tech="478">
      <span class="tech-name">4-7-8 呼吸法</span>
      <span class="tech-pattern">吸4 · 屏7 · 呼8</span>
    </button>
    <button class="tech-btn" data-tech="box">
      <span class="tech-name">箱式呼吸</span>
      <span class="tech-pattern">吸4 · 屏4 · 呼4 · 屏4</span>
    </button>
    <button class="tech-btn" data-tech="426">
      <span class="tech-name">4-2-6 放松呼吸</span>
      <span class="tech-pattern">吸4 · 屏2 · 呼6</span>
    </button>
    <button class="tech-btn" data-tech="wimhof">
      <span class="tech-name">Wim Hof 呼吸法</span>
      <span class="tech-pattern">30次快吸 · 屏息保持</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-card">
    <div class="stat-item">
      <div class="stat-value" id="statSessions">0</div>
      <div class="stat-label">完成次数</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statMinutes">0</div>
      <div class="stat-label">累计分钟</div>
    </div>
    <div class="stat-item">
      <div class="stat-value" id="statStreak">0</div>
      <div class="stat-label">连续天数</div>
    </div>
  </div>

  <!-- Daily Reminder -->
  <div class="daily-reminder" id="dailyReminder"></div>

  <!-- Benefits -->
  <div class="benefits-section" id="benefitsSection">
    <h3>4-7-8 呼吸法的益处</h3>
    <div class="benefit-item">
      <span class="benefit-icon">&#9670;</span>
      <span>帮助快速入睡，缓解失眠问题</span>
    </div>
    <div class="benefit-item">
      <span class="benefit-icon">&#9670;</span>
      <span>降低心率，减轻焦虑和压力</span>
    </div>
    <div class="benefit-item">
      <span class="benefit-icon">&#9670;</span>
      <span>改善情绪管理能力，增强内心平静</span>
    </div>
    <div class="benefit-item">
      <span class="benefit-icon">&#9670;</span>
      <span>降低血压，促进自主神经系统平衡</span>
    </div>
    <div class="benefit-item">
      <span class="benefit-icon">&#9670;</span>
      <span>提升专注力和正念觉察能力</span>
    </div>
  </div>

  <div class="footer">深呼吸，放轻松 &middot; Zen Breathing</div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== State =====
const TECHNIQUES = {
  '478': {
    name: '4-7-8 呼吸法',
    phases: [
      { label: '吸气', desc: '用鼻子缓缓吸气', seconds: 4, type: 'inhale' },
      { label: '屏息', desc: '轻轻屏住呼吸', seconds: 7, type: 'hold' },
      { label: '呼气', desc: '用嘴巴缓缓呼气', seconds: 8, type: 'exhale' },
    ],
    benefits: [
      '帮助快速入睡，缓解失眠问题',
      '降低心率，减轻焦虑和压力',
      '改善情绪管理能力，增强内心平静',
      '降低血压，促进自主神经系统平衡',
      '提升专注力和正念觉察能力',
    ],
  },
  'box': {
    name: '箱式呼吸',
    phases: [
      { label: '吸气', desc: '用鼻子缓缓吸气', seconds: 4, type: 'inhale' },
      { label: '屏息', desc: '轻轻屏住呼吸', seconds: 4, type: 'hold' },
      { label: '呼气', desc: '用嘴巴缓缓呼气', seconds: 4, type: 'exhale' },
      { label: '屏息', desc: '轻轻屏住呼吸', seconds: 4, type: 'hold' },
    ],
    benefits: [
      '提高注意力和思维清晰度',
      '被特种部队用于高压情境下的冷静训练',
      '调节自主神经系统，快速恢复冷静',
      '改善心率变异性，增强抗压能力',
      '帮助在紧张场合保持沉着镇定',
    ],
  },
  '426': {
    name: '4-2-6 放松呼吸',
    phases: [
      { label: '吸气', desc: '用鼻子缓缓吸气', seconds: 4, type: 'inhale' },
      { label: '屏息', desc: '轻轻屏住呼吸', seconds: 2, type: 'hold' },
      { label: '呼气', desc: '用嘴巴缓缓呼气', seconds: 6, type: 'exhale' },
    ],
    benefits: [
      '温和放松，适合日常压力缓解',
      '呼气时间更长，充分排出体内浊气',
      '适合工作间隙的快速减压',
      '改善呼吸效率，增加肺活量',
      '帮助平稳情绪波动',
    ],
  },
  'wimhof': {
    name: 'Wim Hof 呼吸法',
    phases: [
      { label: '快速吸气', desc: '用鼻子/嘴巴深吸气', seconds: 1, type: 'inhale', rapid: true, rapidCount: 15 },
      { label: '快速呼气', desc: '自然放松呼气', seconds: 1, type: 'exhale', rapid: true, rapidCount: 15 },
      { label: '深呼气后屏息', desc: '完全呼出后屏住呼吸', seconds: 30, type: 'hold' },
    ],
    benefits: [
      '增强免疫系统功能',
      '提升能量水平和身体活力',
      '改善血液循环和氧气利用效率',
      '增强对寒冷的耐受能力',
      '释放内啡肽，改善情绪状态',
    ],
  },
};

let state = {
  currentTech: '478',
  phaseIndex: 0,
  rapidIndex: 0,
  secondsLeft: 0,
  totalSeconds: 0,
  elapsedSeconds: 0,
  isRunning: false,
  isPaused: false,
  soundEnabled: true,
  timerInterval: null,
  sessionStartTime: null,
};

// ===== DOM =====
const breathingCircle = document.getElementById('breathingCircle');
const phaseLabel = document.getElementById('phaseLabel');
const phaseSeconds = document.getElementById('phaseSeconds');
const phaseDesc = document.getElementById('phaseDesc');
const progressBar = document.getElementById('progressBar');
const btnStart = document.getElementById('btnStart');
const btnPause = document.getElementById('btnPause');
const btnReset = document.getElementById('btnReset');
const durationInput = document.getElementById('durationMin');
const benefitsSection = document.getElementById('benefitsSection');
const toast = document.getElementById('toast');
const dailyReminder = document.getElementById('dailyReminder');

// ===== Audio =====
let audioCtx = null;

function getAudioContext() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  return audioCtx;
}

function playChime() {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioContext();
    const now = ctx.currentTime;
    // Two-tone chime
    [523.25, 659.25].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, now + i * 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.15 + 0.8);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start(now + i * 0.15);
      osc.stop(now + i * 0.15 + 0.8);
    });
  } catch(e) {}
}

function playBell() {
  if (!state.soundEnabled) return;
  try {
    const ctx = getAudioContext();
    const now = ctx.currentTime;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 440;
    gain.gain.setValueAtTime(0.2, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now);
    osc.stop(now + 1.2);
  } catch(e) {}
}

// ===== Breathing Animation =====
function animatePhase(type, seconds) {
  const minSize = 80;
  const maxSize = 180;
  const duration = seconds * 1000;
  const startSize = parseFloat(breathingCircle.style.width) || minSize;

  let targetSize;
  if (type === 'inhale') targetSize = maxSize;
  else if (type === 'exhale') targetSize = minSize;
  else targetSize = startSize; // hold

  breathingCircle.style.transition = `width ${duration}ms linear, height ${duration}ms linear`;
  breathingCircle.style.width = targetSize + 'px';
  breathingCircle.style.height = targetSize + 'px';

  // Set glow color based on phase
  if (type === 'inhale') {
    breathingCircle.style.boxShadow = '0 0 50px rgba(107,202,155,0.3), 0 0 90px rgba(91,155,213,0.2), 0 0 130px rgba(124,92,191,0.12)';
    breathingCircle.style.background = 'radial-gradient(circle at 40% 35%, rgba(107,202,155,0.7) 0%, rgba(91,155,213,0.5) 40%, rgba(124,92,191,0.3) 100%)';
  } else if (type === 'exhale') {
    breathingCircle.style.boxShadow = '0 0 30px rgba(91,155,213,0.2), 0 0 60px rgba(124,92,191,0.12), 0 0 90px rgba(107,202,155,0.08)';
    breathingCircle.style.background = 'radial-gradient(circle at 40% 35%, rgba(91,155,213,0.5) 0%, rgba(107,202,155,0.4) 40%, rgba(124,92,191,0.25) 100%)';
  } else {
    breathingCircle.style.boxShadow = '0 0 45px rgba(155,126,196,0.28), 0 0 80px rgba(91,155,213,0.18), 0 0 120px rgba(107,202,155,0.1)';
    breathingCircle.style.background = 'radial-gradient(circle at 40% 35%, rgba(155,126,196,0.6) 0%, rgba(124,92,191,0.45) 40%, rgba(91,155,213,0.3) 100%)';
  }
}

// ===== Timer =====
function updateDisplay() {
  const tech = TECHNIQUES[state.currentTech];
  const phase = tech.phases[state.phaseIndex];
  phaseLabel.textContent = phase.label;
  phaseSeconds.textContent = state.secondsLeft;
  phaseDesc.textContent = phase.desc;

  // Progress
  const progress = state.totalSeconds > 0 ? (state.elapsedSeconds / state.totalSeconds) * 100 : 0;
  progressBar.style.width = Math.min(progress, 100) + '%';
}

function resetTimerColors() {
  breathingCircle.style.transition = 'width 0.3s ease, height 0.3s ease';
  breathingCircle.style.width = '80px';
  breathingCircle.style.height = '80px';
  breathingCircle.style.boxShadow = '0 0 40px rgba(107,202,155,0.25), 0 0 80px rgba(91,155,213,0.15), 0 0 120px rgba(124,92,191,0.1)';
  breathingCircle.style.background = 'radial-gradient(circle at 40% 35%, rgba(107,202,155,0.7) 0%, rgba(91,155,213,0.5) 40%, rgba(124,92,191,0.3) 100%)';
}

function stopTimer() {
  if (state.timerInterval) {
    clearInterval(state.timerInterval);
    state.timerInterval = null;
  }
  state.isRunning = false;
  state.isPaused = false;
}

function tick() {
  if (!state.isRunning || state.isPaused) return;

  state.secondsLeft--;
  state.elapsedSeconds++;

  if (state.secondsLeft < 0) {
    // Move to next phase
    const tech = TECHNIQUES[state.currentTech];
    const phase = tech.phases[state.phaseIndex];

    if (phase.rapid && state.rapidIndex < phase.rapidCount - 1) {
      // More rapid breaths to go
      state.rapidIndex++;
      state.secondsLeft = phase.seconds;
      animatePhase(phase.type, phase.seconds);
      playChime();
    } else {
      // Move to next phase
      state.rapidIndex = 0;
      state.phaseIndex++;

      if (state.phaseIndex >= tech.phases.length) {
        // One cycle complete
        state.phaseIndex = 0;

        // Check if total time reached
        if (state.elapsedSeconds >= state.totalSeconds) {
          completeSession();
          return;
        }
      }

      const nextPhase = tech.phases[state.phaseIndex];
      if (nextPhase.rapid) {
        state.rapidIndex = 0;
        state.secondsLeft = nextPhase.seconds;
      } else {
        state.secondsLeft = nextPhase.seconds;
      }
      animatePhase(nextPhase.type, nextPhase.seconds);
      playBell();
    }
  }

  updateDisplay();
}

function startSession() {
  const tech = TECHNIQUES[state.currentTech];
  const durationMin = parseInt(durationInput.value) || 5;
  state.totalSeconds = Math.max(60, Math.min(1800, durationMin * 60));
  state.elapsedSeconds = 0;
  state.phaseIndex = 0;
  state.rapidIndex = 0;
  state.secondsLeft = tech.phases[0].seconds;
  state.isRunning = true;
  state.isPaused = false;
  state.sessionStartTime = Date.now();

  btnStart.disabled = true;
  btnPause.disabled = false;
  btnStart.textContent = '练习中...';
  btnPause.textContent = '暂停';
  durationInput.disabled = true;

  // Animate first phase
  animatePhase(tech.phases[0].type, tech.phases[0].seconds);
  updateDisplay();

  // Start interval
  state.timerInterval = setInterval(tick, 1000);
}

function pauseSession() {
  state.isPaused = !state.isPaused;
  if (state.isPaused) {
    btnPause.textContent = '继续';
    breathingCircle.style.transition = 'none';
  } else {
    btnPause.textContent = '暂停';
    const tech = TECHNIQUES[state.currentTech];
    const phase = tech.phases[state.phaseIndex];
    animatePhase(phase.type, state.secondsLeft);
  }
}

function completeSession() {
  stopTimer();
  btnStart.disabled = false;
  btnPause.disabled = true;
  btnStart.textContent = '开始练习';
  btnPause.textContent = '暂停';
  durationInput.disabled = false;

  resetTimerColors();
  phaseLabel.textContent = '完成';
  phaseSeconds.textContent = '&#10003;';
  phaseDesc.textContent = '做得很好！';
  progressBar.style.width = '100%';

  playBell();
  showToast('练习完成！深呼吸，感受内心的平静');

  // Record stats
  const minutes = Math.round((Date.now() - state.sessionStartTime) / 60000);
  recordSession(minutes);
  updateStats();
}

function resetSession() {
  stopTimer();
  btnStart.disabled = false;
  btnPause.disabled = true;
  btnStart.textContent = '开始练习';
  btnPause.textContent = '暂停';
  durationInput.disabled = false;

  resetTimerColors();
  state.phaseIndex = 0;
  state.rapidIndex = 0;
  state.elapsedSeconds = 0;
  phaseLabel.textContent = '准备';
  phaseSeconds.textContent = '--';
  phaseDesc.textContent = '选择呼吸技巧开始';
  progressBar.style.width = '0%';
}

// ===== Stats =====
function loadStats() {
  try {
    return JSON.parse(localStorage.getItem('breathing-guide-stats') || '{"sessions":0,"minutes":0,"streak":0,"lastDate":""}');
  } catch { return { sessions: 0, minutes: 0, streak: 0, lastDate: '' }; }
}

function saveStats(stats) {
  localStorage.setItem('breathing-guide-stats', JSON.stringify(stats));
}

function recordSession(minutes) {
  const stats = loadStats();
  const today = new Date().toISOString().split('T')[0];
  stats.sessions++;
  stats.minutes += minutes;

  if (stats.lastDate !== today) {
    const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
    if (stats.lastDate === yesterday) {
      stats.streak++;
    } else {
      stats.streak = 1;
    }
    stats.lastDate = today;
  }

  saveStats(stats);
}

function updateStats() {
  const stats = loadStats();
  document.getElementById('statSessions').textContent = stats.sessions;
  document.getElementById('statMinutes').textContent = stats.minutes;
  document.getElementById('statStreak').textContent = stats.streak;

  // Daily reminder
  const today = new Date().toISOString().split('T')[0];
  if (stats.lastDate !== today) {
    dailyReminder.textContent = '今天还没有练习哦，花几分钟关照自己的呼吸吧';
  } else {
    dailyReminder.textContent = '今日已完成练习，做得很好！明天继续坚持';
  }
}

// ===== Toast =====
let toastTimer;
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== Sound Toggle =====
function toggleSound() {
  state.soundEnabled = !state.soundEnabled;
  const btn = document.getElementById('btnSound');
  if (state.soundEnabled) {
    btn.textContent = '🔔 提示音：开';
    btn.classList.add('on');
  } else {
    btn.textContent = '🔕 提示音：关';
    btn.classList.remove('on');
  }
}

// ===== Benefits Update =====
function updateBenefits(techKey) {
  const tech = TECHNIQUES[techKey];
  const h3 = benefitsSection.querySelector('h3');
  h3.textContent = tech.name + '的益处';
  const items = benefitsSection.querySelectorAll('.benefit-item');
  items.forEach((item, i) => {
    if (i < tech.benefits.length) {
      item.style.display = 'flex';
      item.querySelector('span:last-child').textContent = tech.benefits[i];
    } else {
      item.style.display = 'none';
    }
  });

  // Add extra items if needed
  if (tech.benefits.length > items.length) {
    for (let i = items.length; i < tech.benefits.length; i++) {
      const div = document.createElement('div');
      div.className = 'benefit-item';
      div.innerHTML = `<span class="benefit-icon">&#9670;</span><span>${tech.benefits[i]}</span>`;
      benefitsSection.appendChild(div);
    }
  }
}

// ===== Event Listeners =====
btnStart.addEventListener('click', () => {
  if (!state.isRunning) startSession();
});

btnPause.addEventListener('click', () => {
  if (state.isRunning) pauseSession();
});

btnReset.addEventListener('click', () => {
  resetSession();
});

document.querySelectorAll('.tech-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (state.isRunning) return; // Don't switch during session
    document.querySelectorAll('.tech-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    state.currentTech = btn.dataset.tech;
    resetSession();
    updateBenefits(btn.dataset.tech);
  });
});

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    if (!state.isRunning) startSession();
    else pauseSession();
  }
});

// ===== Init =====
updateStats();
updateBenefits('478');
</script>
